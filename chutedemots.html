        function fail(){ //quand rate enleve 1 vie
            failSound.play()
            lives-= 1
            livesCount.textContent = "Vies : " + lives
            if(lives <= 0){ //si plus de vie being tu perd
                gameoverSound.play() //arrete les interval et cache tout puis montre gameover scene
                clearInterval(activeGame)
                clearInterval(activeGlobal)
                clearInterval(activeTimer)
                word1.classList.add("hide") 
                word2.classList.add("hide") 
                word3.classList.add("hide") 
                word4.classList.add("hide")
                gameoverMessage.classList.remove("hide")

        function sucess(){ //quand reussit gagne un point
